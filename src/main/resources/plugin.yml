name: TeleportLocations
version: '${version}'
main: com.nick.teleportlocations.TeleportLocationsPlugin
api-version: '26.1'
author: Nick
description: Homes, warps, shops, outposts, and spawn control.
depend:
  - HavenCore
softdepend:
  - LandClaims
commands:
  ht:
    description: HavenTeleport admin and utility commands.
    usage: /ht
    aliases: [haventeleport, tl]
  home:
    description: Teleport to your main home or a named home.
    usage: /home [name]
  homes:
    description: Open your homes menu.
    usage: /homes
  sethome:
    description: Create or update a home.
    usage: /sethome <name>
  delhome:
    description: Delete a home.
    usage: /delhome <name>
  mainhome:
    description: Set your main home.
    usage: /mainhome <name>
  warp:
    description: Teleport to a visible warp.
    usage: /warp <name>
  warps:
    description: Open the warps menu.
    usage: /warps
  setwarp:
    description: Create or update a player warp.
    usage: /setwarp <name>
  delwarp:
    description: Delete one of your player warps.
    usage: /delwarp <name>
  shops:
    description: Open the shop warps menu.
    usage: /shops
    aliases: [shopwarps]
  setshop:
    description: Create or update a free public shop warp.
    usage: /setshop <name>
  delshop:
    description: Delete one of your shop warps.
    usage: /delshop <name>
  setoutpost:
    description: Create or update an outpost.
    usage: /setoutpost <name>
  outpost:
    description: Teleport to one of your outposts.
    usage: /outpost <name>
  deloutpost:
    description: Delete one of your outposts.
    usage: /deloutpost <name>
  spawn:
    description: Teleport to server spawn.
    usage: /spawn
  tpa:
    description: Request to teleport to another player.
    usage: /tpa <player>
  tpahere:
    description: Request another player teleport to you.
    usage: /tpahere <player>
  tpaccept:
    description: Accept a pending teleport request.
    usage: /tpaccept [player]
    aliases: [tpyes]
  tpdecline:
    description: Decline a pending teleport request.
    usage: /tpdecline [player]
    aliases: [tpno]
  tpcancel:
    description: Cancel a pending outgoing teleport request.
    usage: /tpcancel [player]
  tptoggle:
    description: Toggle incoming teleport requests.
    usage: /tptoggle
permissions:
  teleportlocations.use:
    description: Allows basic TeleportLocations usage.
    default: true
  teleportlocations.menu:
    description: Allows opening location menus.
    default: true
  teleportlocations.home:
    description: Allows home commands.
    default: true
  teleportlocations.warp:
    description: Allows warp commands.
    default: true
  teleportlocations.shop:
    description: Allows shop warp commands.
    default: true
  teleportlocations.outpost:
    description: Allows outpost commands.
    default: true
  teleportlocations.spawn:
    description: Allows /spawn.
    default: true
  teleportlocations.tpa:
    description: Allows sending /tpa requests.
    default: true
  teleportlocations.tpahere:
    description: Allows sending /tpahere requests.
    default: true
  teleportlocations.tpaccept:
    description: Allows accepting teleport requests.
    default: true
  teleportlocations.tpdecline:
    description: Allows declining teleport requests.
    default: true
  teleportlocations.tpcancel:
    description: Allows cancelling outgoing teleport requests.
    default: true
  teleportlocations.tptoggle:
    description: Allows toggling incoming teleport requests.
    default: true
  teleportlocations.elevator:
    description: Allows elevator block usage.
    default: true
    children:
      teleportlocations.elevator.place: true
      teleportlocations.elevator.break: true
      teleportlocations.elevator.use: true
      teleportlocations.elevator.menu: true
      teleportlocations.elevator.particle.wax_on: true
  teleportlocations.admin:
    description: Grants all TeleportLocations admin permissions.
    default: op
    children:
      teleportlocations.admin.reload: true
      teleportlocations.admin.limits: true
      teleportlocations.admin.serverwarp: true
      teleportlocations.admin.spawn: true
      teleportlocations.admin.edit: true
      teleportlocations.admin.teleport: true
      teleportlocations.admin.bypass.creation: true
      teleportlocations.admin.bypass.claims: true
      teleportlocations.admin.bypass.cost: true
      teleportlocations.admin.bypass.cooldown: true
      teleportlocations.admin.bypass.tpa.cooldown: true
      teleportlocations.admin.elevator: true
  teleportlocations.elevator.place:
    description: Allows placing elevator blocks in owned claims.
    default: true
  teleportlocations.elevator.break:
    description: Allows breaking elevator blocks where the player has build access.
    default: true
  teleportlocations.elevator.use:
    description: Allows using elevator blocks where the player has claim access.
    default: true
  teleportlocations.elevator.menu:
    description: Allows opening the elevator settings dialog.
    default: true
  teleportlocations.elevator.particle.wax_on:
    description: Allows selecting the Wax On elevator particle.
    default: true
  teleportlocations.elevator.particle.end_rod:
    description: Allows selecting the End Rod elevator particle.
    default: op
  teleportlocations.admin.elevator:
    description: Allows admin elevator management.
    default: op
  teleportlocations.admin.bypass.claims:
    description: Allows admin claim bypass mode for protected elevator actions.
    default: op
  teleportlocations.admin.bypass.tpa.cooldown:
    description: Allows bypassing TPA request cooldowns.
    default: op
