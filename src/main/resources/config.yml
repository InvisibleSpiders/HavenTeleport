# TeleportLocations main configuration.
# Categories control limits, creation zones, default access, visibility, and cost support.
# Player limits are not permission based. Admin commands store per-player overrides.

integrations:
  landclaims:
    # allow: creation checks pass when LandClaims is missing.
    # deny-claim-required: homes, player warps, and shops require LandClaims; wilderness outposts still work.
    # deny-all: all non-admin creation is blocked while LandClaims is missing.
    missing-service-policy: deny-claim-required
  vaultunlocked:
    # If false, money costs are denied when VaultUnlocked is unavailable.
    treat-money-costs-as-free-when-missing: false

teleport:
  # Players must wait this many seconds before teleporting.
  warmup-seconds: 3
  # Moving during warmup cancels the pending teleport.
  cancel-on-move: true
  # The plugin can search nearby blocks for a safe landing spot.
  safe-search-radius: 3

spawn:
  # New players enter at the managed server spawn.
  first-join:
    target: spawn
  # Existing players stay where they logged out by default.
  login:
    target: last-location
  # Death respawn prefers main home, then falls back safely.
  death-respawn:
    target: main-home
    fallback:
      - bed-spawn
      - spawn
      - vanilla-world-spawn

elevators:
  # Maximum vertical distance between linked elevator floors.
  max-distance: 16
  # Cooldown applied after elevator use to prevent rapid-fire movement.
  cooldown-seconds: 2
  particles:
    # Subtle floor cue particles can be disabled globally.
    enabled: true
    # Players can select unlocked particles later through the elevator dialog.
    default: WAX_ON
    # How often elevator cue particles are emitted.
    interval-ticks: 20

tpa:
  # Enables player-to-player teleport request commands.
  enabled: true
  # Pending requests expire after this many seconds.
  request-timeout-seconds: 60
  # Cooldown after an accepted request before the requester can send another request. 0 disables it.
  cooldown-seconds: 0
  # Delay after a request is accepted before teleporting. 0 disables it.
  warmup-seconds: 0
  # Moving during a non-zero warmup cancels the teleport.
  cancel-warmup-on-move: true

categories:
  home:
    owner: player
    default-limit: 3
    creation-zone: trusted-claim
    default-access: private
    default-visibility: hidden
    allows-cost: false
  player_warp:
    owner: player
    default-limit: 2
    creation-zone: trusted-claim
    default-access: public
    default-visibility: listed
    allows-cost: true
  shop:
    owner: player
    default-limit: 1
    creation-zone: trusted-claim
    default-access: public
    default-visibility: listed
    allows-cost: false
    force-public: true
    force-listed: true
  outpost:
    owner: player
    default-limit: 1
    creation-zone: wilderness
    default-access: private
    default-visibility: hidden
    allows-cost: false
  server_warp:
    owner: server
    default-limit: -1
    creation-zone: admin
    default-access: public
    default-visibility: listed
    allows-cost: false
